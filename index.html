<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Coin | Secure Investment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div id="auth-container" class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">SMART COIN</h1>
            <p class="text-gray-400 text-sm">Invest Smart, Earn Daily</p>
        </div>

        <div id="login-form">
            <input type="email" id="login-email" placeholder="Email Address" class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 outline-none">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-3 mb-6 rounded bg-gray-800 border border-gray-700 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Login</button>
            <p class="mt-4 text-center text-sm">Don't have an account? <a href="#" onclick="toggleAuth()" class="text-blue-400">Signup</a></p>
        </div>

        <div id="signup-form" class="hidden">
            <input type="text" id="user-name" placeholder="Full Name" class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 outline-none">
            <input type="email" id="signup-email" placeholder="Email Address" class="w-full p-3 mb-4 rounded bg-gray-800 border border-gray-700 outline-none">
            <input type="password" id="signup-password" placeholder="Password" class="w-full p-3 mb-6 rounded bg-gray-800 border border-gray-700 outline-none">
            <button onclick="register()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition">Create Account</button>
            <p class="mt-4 text-center text-sm">Already have an account? <a href="#" onclick="toggleAuth()" class="text-blue-400">Login</a></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }
    </script>
</body>
</html>
