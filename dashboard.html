<div class="glass p-6 rounded-xl max-w-lg mx-auto mt-10">
    <h2 class="text-xl font-bold mb-4">Welcome, <span id="user-name-display">User</span></h2>
    
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 rounded-lg mb-6">
        <p class="text-sm opacity-80">Total Balance</p>
        <h1 class="text-4xl font-black">₹ <span id="balance-amount">0</span></h1>
    </div>

    <div class="bg-gray-800 p-4 rounded-lg">
        <h3 class="text-md font-semibold mb-3 text-green-400">Add Money (Real Balance)</h3>
        <p class="text-xs text-gray-400 mb-2">Scan QR to Pay:</p>
        <img src="Https://github.com/eshalarch/eshalarch/blob/2107ddac527646bcf540a462812d713a63e9a64a/qr.jpg" id="admin-qr" class="w-48 h-48 mx-auto mb-4 border-2 border-white">
        
        <input type="number" id="deposit-amount" placeholder="Enter Amount" class="w-full p-2 mb-2 bg-gray-700 rounded border-none">
        <input type="text" id="utr-number" placeholder="Enter Transaction ID / UTR" class="w-full p-2 mb-4 bg-gray-700 rounded border-none">
        <button onclick="submitDeposit()" class="w-full bg-green-600 p-2 rounded font-bold">Submit Payment</button>
    </div>
</div>
