<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Eshal Arch</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Configuration (Same as index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyDN9MF8w3EzQmObXv-C8twMXxwcOsBHT7E",
            authDomain: "smart-coin-2f55e.firebaseapp.com",
            projectId: "smart-coin-2f55e",
            storageBucket: "smart-coin-2f55e.firebasestorage.app",
            messagingSenderId: "43438079124",
            appId: "1:43438079124:web:fa572b0c06d7f6a1190881"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        /* ========================== HOME AUTH START ========================== */
        // Yeh function check karega ki user logged in hai ya nahi
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User login hai, display name ya email dikha sakte hain
                console.log("User is signed in:", user.email);
            } else {
                // User login nahi hai, wapas Login page pe bhejo
                alert("Access Denied! Please login first.");
                window.location.href = "index.html";
            }
        });

        // Logout Function
        window.handleLogout = async () => {
            try {
                await signOut(auth);
                window.location.href = "index.html";
            } catch (error) {
                alert("Error logging out: " + error.message);
            }
        };
        /* ========================== HOME AUTH END ========================== */
    </script>

    <style>
        /* ========================== HOME STYLE START ========================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            font-weight: 300;
            color: #c5a059; /* Architect Gold */
            margin-bottom: 20px;
        }

        .btn-logout {
            margin-top: 30px;
            padding: 10px 25px;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .btn-logout:hover {
            border-color: #c5a059;
            color: #c5a059;
        }
        /* ========================== HOME STYLE END ========================== */
    </style>
</head>
<body>

    <div id="welcome-section">
        <h1>WELCOME ESHAL ARCH</h1>
        <p style="color: #666; letter-spacing: 2px;">Architectural Excellence & Design</p>
        
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
    </body>
</html>
